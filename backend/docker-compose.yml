services:
  postgres:
    image: postgres:17
    container_name: postgres-db;
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWARD: admin@9090;
      POSTGRES_DB: Odoo26
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
